<div class="bg-wave"></div>

<div class="reg-container">
  <div class="reg-card">
    <div class="reg-header">
      <div class="icon-circle">
        <i class="fas fa-user-plus"></i>
      </div>
      <h2>會員註冊</h2>
      <p>建立帳號以存取問卷管理權限</p>
    </div>

    <form #regForm="ngForm" (ngSubmit)="onRegister()">
      <div class="reg-input-group">
        <label for="regAccount">帳號 Account</label>
        <input
          id="regAccount"
          type="email"
          name="account"
          [(ngModel)]="regData.account"
          placeholder="請輸入 Email 帳號"
          required
        />
      </div>

      <div class="reg-input-group">
        <label for="regName">姓名 Name</label>
        <input
          id="regName"
          type="text"
          name="name"
          [(ngModel)]="regData.name"
          placeholder="請輸入真實姓名"
          required
        />
      </div>

      <!-- [新增] 年齡欄位 -->
      <div class="reg-input-group">
        <label for="regAge">年齡 Age</label>
        <input
          id="regAge"
          type="number"
          name="age"
          [(ngModel)]="regData.age"
          placeholder="請輸入您的年齡"
          min="1"
          max="150"
          required
        />
      </div>

      <div class="reg-input-group">
        <label for="regPassword">密碼 Password</label>
        <div class="password-wrapper">
          <input
            id="regPassword"
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="regData.password"
            placeholder="請設定登入密碼"
            required
            minlength="8"
          />
          <button
            type="button"
            class="toggle-eye"
            (click)="showPassword = !showPassword"
          >
            <i
              class="fas"
              [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"
            ></i>
          </button>
        </div>
      </div>

      <div class="reg-input-group">
        <label for="regConfirmPassword">確認密碼 Confirm Password</label>
        <div class="password-wrapper">
          <input
            id="regConfirmPassword"
            [type]="showConfirmPassword ? 'text' : 'password'"
            name="confirmPassword"
            [(ngModel)]="regData.confirmPassword"
            placeholder="請再次輸入密碼"
            required
          />
          <button
            type="button"
            class="toggle-eye"
            (click)="showConfirmPassword = !showConfirmPassword"
          >
            <i
              class="fas"
              [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"
            ></i>
          </button>
        </div>
        @if (
          regData.confirmPassword &&
          regData.password !== regData.confirmPassword
        ) {
          <span class="reg-error">兩次密碼輸入不一致</span>
        }
      </div>

      <div class="reg-footer">
        <button type="submit" class="reg-btn-main" [disabled]="regForm.invalid">
          確認註冊
        </button>

        <div class="reg-sub-links">
          <button type="button" class="reg-btn-link" (click)="goBack()">
            返回列表
          </button>
          <button type="button" class="reg-btn-link" (click)="goToLogin()">
            已有帳號？登入
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
